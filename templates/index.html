{% extends 'base.html' %}
{% block title %}Leaderboard | ModelScope{% endblock %}
{% block content %}
<section class="hero">
  <p class="eyebrow">AI MODEL INTELLIGENCE</p>
  <h1><em>Leaderboard<br></em></h1>
  <!-- <p>評価対象・組織・ライセンスから、AIモデルの評価結果を横断的に検索できます。</p> -->
</section>
<section class="filter-panel" aria-label="ランキングの絞り込み">
  <form method="get" data-categories-by-arena='{{ filter_options.categories_by_arena|tojson }}' data-dates-by-arena-category='{{ filter_options.dates_by_arena_category|tojson }}' data-arena-options='{{ filter_options.arena_menu|tojson }}'>
    <label class="model-filter">モデル名<input name="q" value="{{ filters.q }}" placeholder="モデル名を入力"></label>
    {% include '_arena_picker.html' %}
    <label class="organization-filter">組織<select name="organization"><option value="">すべて</option>{% for item in filter_options.organizations %}<option value="{{ item.organization_id }}" {% if filters.organization == item.organization_id %}selected{% endif %}>{{ item.organization_name }}</option>{% endfor %}</select></label>
    <label class="license-filter">ライセンス<select name="license"><option value="">すべて</option>{% for item in filter_options.licenses %}<option value="{{ item.license_id }}" {% if filters.license == item.license_id %}selected{% endif %}>{{ item.license_name }}</option>{% endfor %}</select></label>
    <label class="category-filter">カテゴリ<select name="category" id="category-filter">{% for item in filter_options.categories %}<option value="{{ item.category }}" {% if filters.category == item.category %}selected{% endif %}>{{ item.category }}</option>{% endfor %}</select></label>
    <label class="date-filter">公開日<select name="date" id="date-filter">{% for item in filter_options.dates %}<option value="{{ item.leaderboard_publish_date }}" {% if filters.date == item.leaderboard_publish_date %}selected{% endif %}>{{ item.leaderboard_publish_date }}</option>{% endfor %}</select></label>
    <div class="filter-actions"><button type="submit">検索する</button><a href="{{ url_for('index') }}">リセット</a></div>
  </form>
</section>
{% include '_leaderboard_results.html' %}
{% endblock %}
